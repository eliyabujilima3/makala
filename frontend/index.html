<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Meshaki Makala | AI & Data Scientist</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
:root{
    --primary:#2563eb;
    --secondary:#7c3aed;
    --dark:#0f172a;
    --light:#f8fafc;
    --gray:#64748b;
    --border:#e2e8f0;
    --shadow:0 25px 70px rgba(0,0,0,0.12);
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{
    background:linear-gradient(180deg,#f8fafc,#eef2ff);
    color:var(--dark);
}

/* NAV */
.navbar{
    position:fixed;
    width:100%;
    top:0;
    z-index:999;
    backdrop-filter:blur(20px);
    background:rgba(255,255,255,0.6);
    border-bottom:1px solid var(--border);
}

.nav-container{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 5%;
}

.logo{font-size:26px;font-weight:900;}
.logo span{color:var(--primary);}

nav{display:flex;gap:22px;}
nav a{text-decoration:none;color:var(--dark);font-weight:600;}
nav a:hover{color:var(--primary);}

.nav-btn{
    padding:10px 18px;
    background:linear-gradient(135deg,var(--primary),var(--secondary));
    color:white;
    border-radius:12px;
    text-decoration:none;
}

/* HERO */
.hero{min-height:100vh;display:flex;align-items:center;padding-top:120px;}

.hero-container{
    display:grid;
    grid-template-columns:1.2fr 1fr;
    gap:60px;
    align-items:center;
}

.hero-text h1{font-size:70px;font-weight:900;}
.hero-text h1 span{
    background:linear-gradient(135deg,var(--primary),var(--secondary));
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.hero-text p{margin-top:15px;color:var(--gray);line-height:1.8;font-size:18px;}

.badge{
    display:inline-block;
    padding:10px 16px;
    background:rgba(37,99,235,0.08);
    border:1px solid rgba(37,99,235,0.
