<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meshaki Makala | Data Scientist & Software Developer</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

    <style>
        :root {
            --primary: #2563eb;
            --secondary: #1d4ed8;
            --dark: #0f172a;
            --light: #f8fafc;
            --gray: #64748b;
            --border: #e2e8f0;
            --shadow: 0 15px 45px rgba(0, 0, 0, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        html { scroll-behavior: smooth; }

        body {
            background: var(--light);
            color: var(--dark);
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 1300px;
            margin: auto;
            padding: 0 5%;
        }

        section { padding: 110px 0; }

        /* NAVBAR */
        .navbar {
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 999;
            backdrop-filter: blur(15px);
            background: rgba(255,255,255,0.85);
            border-bottom: 1px solid var(--border);
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
        }

        nav { display: flex; gap: 30px; }

        nav a {
            text-decoration: none;
            color: var(--dark);
            font-weight: 600;
        }

        nav a:hover { color: var(--primary); }

        .nav-btn {
            padding: 12px 22px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border-radius: 12px;
            text-decoration: none;
        }

        /* HERO FIX */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding-top: 120px;
        }

        .hero-container {
            display: flex;
            gap: 60px;
            align-items: center;
        }

        .hero-text { flex: 1; }

        .hero-image { flex: 1; }

        .image-box {
            width: 100%;
            max-width: 420px;
            height: 650px;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* FIX BROKEN SECTIONS */
        .about-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
        }

        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
        }

        .skill-card {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: var(--shadow);
        }

        /* SLIDER FIX */
        .slider-container {
            overflow: hidden;
            border-radius: 25px;
            position: relative;
        }

        .slider {
            display: flex;
            transition: transform 0.5s ease;
        }

        .slide {
            min-width: 100%;
        }

        .slide img {
            width: 100%;
            height: 700px;
            object-fit: cover;
            display: block;
        }

        /* CONTACT FIX */
        .contact-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            background: white;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        .contact-left {
            padding: 50px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        .contact-form {
            padding: 50px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input, textarea {
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        button {
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            cursor: pointer;
        }

        footer {
            text-align: center;
            padding: 30px;
            color: var(--gray);
        }

        @media (max-width: 900px) {
            .hero-container,
            .about-grid,
            .contact-wrapper {
                grid-template-columns: 1fr;
                display: grid;
            }

            nav { display: none; }
        }
    </style>
</head>

<body>

<header class="navbar">
    <div class="nav-container">
        <div class="logo">Meshaki<span>.</span></div>
        <nav>
            <a href="#home">Home</a>
            <a href="#about">About</a>
            <a href="#skills">Skills</a>
            <a href="#projects">Projects</a>
            <a href="#contact">Contact</a>
        </nav>
        <a href="#contact" class="nav-btn">Contact</a>
    </div>
</header>

<main>

<!-- HERO -->
<section class="hero" id="home">
    <div class="container hero-container">
        <div class="hero-text">
            <h1>Meshaki <span>Makala</span></h1>
            <p>Data Scientist & Software Developer</p>
        </div>

        <div class="hero-image">
            <div class="image-box">
                <img src="assets/images/mishaely.png" alt="profile"
                     onerror="this.src='https://via.placeholder.com/420x650'">
            </div>
        </div>
    </div>
</section>

<!-- ABOUT -->
<section id="about">
    <div class="container about-grid">
        <div>
            <h2>About Me</h2>
            <p>Data Science + AI + Software Engineering</p>
        </div>
    </div>
</section>

<!-- SKILLS -->
<section id="skills">
    <div class="container">
        <div class="skills-grid">
            <div class="skill-card">Machine Learning</div>
            <div class="skill-card">Data Analysis</div>
            <div class="skill-card">AI</div>
            <div class="skill-card">Software Dev</div>
        </div>
    </div>
</section>

<!-- PROJECTS -->
<section id="projects">
    <div class="container">
        <div class="slider-container">
            <div class="slider" id="slider">

                <div class="slide">
                    <img src="assets/images/challenge1.png"
                         onerror="this.src='https://via.placeholder.com/1200x700'">
                </div>

                <div class="slide">
                    <img src="assets/images/challenge2.png"
                         onerror="this.src='https://via.placeholder.com/1200x700'">
                </div>

                <div class="slide">
                    <img src="assets/images/mishaely.png"
                         onerror="this.src='https://via.placeholder.com/1200x700'">
                </div>

            </div>
        </div>
    </div>
</section>

<!-- CONTACT -->
<section id="contact">
    <div class="container contact-wrapper">

        <div class="contact-left">
            <h2>Contact</h2>
            <p>Let’s work together</p>
        </div>

        <form class="contact-form" id="contactForm">
            <input type="text" placeholder="Name" required>
            <input type="email" placeholder="Email" required>
            <textarea placeholder="Message" required></textarea>
            <button type="submit">Send</button>
        </form>

    </div>
</section>

</main>

<footer>
    © 2026 Meshaki Makala
</footer>

<script>
let slider = document.getElementById("slider");
let index = 0;

setInterval(() => {
    index = (index + 1) % 3;
    slider.style.transform = `translateX(-${index * 100}%)`;
}, 4000);

document.getElementById("contactForm").addEventListener("submit", e => {
    e.preventDefault();
    alert("Message sent!");
});
</script>

</body>
</html>
